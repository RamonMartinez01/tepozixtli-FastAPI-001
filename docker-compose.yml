services:
  # ----------------------------------------------
  # 1. LA BÓVEDA: Base de Datos PostgreSQL
  # ----------------------------------------------
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: tepozixtli_db
    restart: always
    networks:
      - tepozixtli_backend_network
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------
  # 2. EL MOTOR: API FastAPI (Nuestra App)
  # ----------------------------------------------
  api:
    build:
      context: ./fastapi  # <--- Cambiamos el contexto a la carpeta fastapi
      dockerfile: Dockerfile
    container_name: tepozixtli_api
    volumes:
      - ./fastapi:/app    # <--- Mapeamos la carpeta correctamente
    ports:
      - "8001:8000"
    env_file:
      - .env # Lee las variables de tu archivo local (.env)
    networks:
      - tepozixtli_backend_network
    depends_on:
      db:
        condition: service_healthy # Espera a que la base de datos esté lista
    

  # ----------------------------------------------
  # 3. EL INGESTOR: Microservicio en Go
  # ----------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: tepozixtli_worker
    restart: always
    env_file:
      - .env  # Inyecta las variables globales directamente al entorno del contenedor
    networks:
      - tepozixtli_backend_network
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------
  # 4. EL MENSAJERO: Redis
  # ----------------------------------------------
  redis_broker:
    image: redis:7-alpine
    container_name: tepozixtli_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Iniciamos el servidor exigiéndole la contraseña que leerá del .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - tepozixtli_backend_network
    volumes:
      - redis_data:/data

# ----------------------------------------------
# REDES Y VOLÚMENES
# ----------------------------------------------
networks:
  tepozixtli_backend_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: