services:
  # ----------------------------------------------
  # 1. LA BÓVEDA: Base de Datos PostgreSQL
  # ----------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: ojos-de-cobre_db
    restart: always
    # No exponemos los 'ports' directamente al host público para proteger la integridad.
    # Solo la API dentro de la red interna de Docker podrá verla.
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------
  # 2. EL MOTOR: API FastAPI (Nuestra App)
  # ----------------------------------------------
  api:
    build: .
    container_name: ojos-de-cobre_api
    restart: always
    ports:
      - "8001:8000" # Exponemos la API al exterior para conectar con el frontend
    env_file:
      - .env # Lee las variables de tu archivo local (.env)
    depends_on:
      db:
        condition: service_healthy # Espera a que la base de datos esté lista
    volumes:
      # Sincroniza el código en tiempo real para desarrollo local (Live Reload).
      - .:/app

# ----------------------------------------------
# VOLUMEN PERSISTENTE (Para no perder datos si el contenedor cae)
# ----------------------------------------------
volumes:
  postgres_data: